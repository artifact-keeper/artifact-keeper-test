name: Resilience Tests

on:
  workflow_call:
    inputs:
      backend_url:
        required: true
        type: string
      run_id:
        required: true
        type: string
      namespace:
        required: true
        type: string
      category:
        required: false
        type: string
        default: 'all'

jobs:
  test:
    runs-on: ak-e2e-runners
    strategy:
      fail-fast: false
      matrix:
        category: [crash, restart, network, storage, data]
    env:
      BASE_URL: ${{ inputs.backend_url }}
      RUN_ID: ${{ inputs.run_id }}
      NAMESPACE: ${{ inputs.namespace }}
      JUNIT_OUTPUT_DIR: /tmp/test-results
    steps:
      - uses: actions/checkout@v4

      - name: Run ${{ matrix.category }} resilience tests
        if: inputs.category == 'all' || inputs.category == matrix.category
        run: |
          mkdir -p "$JUNIT_OUTPUT_DIR"
          for script in tests/resilience/${{ matrix.category }}/test-*.sh; do
            [ -f "$script" ] || continue
            echo "=== Running ${script} ==="
            bash "$script" || true
          done

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-resilience-${{ matrix.category }}
          path: /tmp/test-results/*.xml
          if-no-files-found: ignore
